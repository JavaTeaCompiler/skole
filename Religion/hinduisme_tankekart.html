ntent":"<em>Saraswati:</em> Kunnskap og kunst","children":[],"payload":{"tag":"li","lines":"12,13"}},{"content":"<em>Lakshmi:</em> Velstand og lykke","children":[],"payload":{"tag":"li","lines":"13,14"}},{"content":"<em>Parvati/Durga/Kali:</em> Kraft, kj&#xe6;rlighet og &#xf8;deleggelse av ondskap","children":[],"payload":{"tag":"li","lines":"14,16"}}],"payload":{"tag":"li","lines":"11,16"}}],"payload":{"tag":"h3","lines":"5,6"}}],"payload":{"tag":"h2","lines":"1,2"}},{"content":"2. Menneskesyn","children":[{"content":"Atman (Den evige sjelen)","children":[{"content":"Den individuelle sjelen i alle levende vesener.","children":[],"payload":{"tag":"li","lines":"18,19"}},{"content":"Kjernefilosofi (s&#xe6;rlig i Advaita Vedanta): Atman er dypest sett identisk med Brahman.","children":[],"payload":{"tag":"li","lines":"19,20"}}],"payload":{"tag":"h3","lines":"17,18"}},{"content":"Samsara (Gjenf&#xf8;delsens sirkel)","children":[{"content":"Det evige, sirkul&#xe6;re kretsl&#xf8;pet av f&#xf8;dsel, d&#xf8;d og gjenf&#xf8;delse.","children":[],"payload":{"tag":"li","lines":"21,22"}},{"content":"Livet er preget av ubestandighet og lidelse.","children":[],"payload":{"tag":"li","lines":"22,23"}}],"payload":{"tag":"h3","lines":"20,21"}},{"content":"Karma (Loven om &#xe5;rsak og virkning)","children":[{"content":"Summen av menneskets handlinger.","children":[],"payload":{"tag":"li","lines":"24,25"}},{"content":"Gode handlinger (i tr&#xe5;d med Dharma) gir god karma, d&#xe5;rlige handlinger gir d&#xe5;rlig karma. Styrer neste inkarnasjon.","children":[],"payload":{"tag":"li","lines":"25,27"}}],"payload":{"tag":"h3","lines":"23,24"}}],"payload":{"tag":"h2","lines":"16,17"}},{"content":"3. Frelse (Moksha)","children":[{"content":"Frigj&#xf8;ring","children":[{"content":"M&#xe5;let er &#xe5; bryte ut av Samsara og forenes med Brahman.","children":[],"payload":{"tag":"li","lines":"29,30"}}],"payload":{"tag":"h3","lines":"28,29"}},{"content":"De tre frelsesveiene (Marga)","children":[{"content":"<strong>Jnana-marga (Kunnskapens vei):</strong> Erkjennelse av at Atman = Brahman. Krever intens meditasjon, yoga og askese.","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"<strong>Karma-marga (Handlingens vei):</strong> &#xc5; utf&#xf8;re sine plikter (Dharma) uselvisk, uten tanke p&#xe5; personlig vinning.","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"<strong>Bhakti-marga (Hengivelsens vei):</strong> Den mest utbredte. Kj&#xe6;rlighet og hengivelse til en personlig guddom (f.eks. Krishna eller Shiva), hvor gudens n&#xe5;de gir frelse.","children":[],"payload":{"tag":"li","lines":"33,35"}}],"payload":{"tag":"h3","lines":"30,31"}}],"payload":{"tag":"h2","lines":"27,28"}},{"content":"4. Etikk og Samfunn","children":[{"content":"Dharma (Den kosmiske orden)","children":[{"content":"Plikt, lov, religion og etikk. Alt m&#xe5; opprettholdes for at verden ikke skal g&#xe5; under.","children":[],"payload":{"tag":"li","lines":"37,38"}}],"payload":{"tag":"h3","lines":"36,37"}},{"content":"Kastesystemet (Varna og Jati)","children":[{"content":"<strong>Varna (De fire hovedklassene):</strong> Brahmaner (prester), Kshatriyaer (kriger/hersker), Vaishyaer (b&#xf8;nder/handelsmenn), Shudraer (tjenere).","children":[],"payload":{"tag":"li","lines":"39,40"}},{"content":"<strong>Daliter:</strong> &quot;De uber&#xf8;rbare&quot; / kastel&#xf8;se.","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"<em>VG3-fokus:</em> Kastesystemet er forbudt ved lov i India i dag (mtp. diskriminering), men lever videre sosialt og rituelt, s&#xe6;rlig p&#xe5; landsbygda.","children":[],"payload":{"tag":"li","lines":"41,42"}}],"payload":{"tag":"h3","lines":"38,39"}},{"content":"Ahimsa (Ikke-vold)","children":[{"content":"Prinsippet om &#xe5; ikke skade levende vesener.","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"Begrunner hvorfor mange hinduer er vegetarianere, og hvorfor kua regnes som hellig (symbol p&#xe5; liv og moderlighet).","children":[],"payload":{"tag":"li","lines":"44,46"}}],"payload":{"tag":"h3","lines":"42,43"}}],"payload":{"tag":"h2","lines":"35,36"}},{"content":"5. Hellig Tekst og Tradisjon","children":[{"content":"Shruti (Det som er h&#xf8;rt - &#xe5;penbart)","children":[{"content":"Regnes som evige sannheter &#xe5;penbart for gamle vismenn.","children":[],"payload":{"tag":"li","lines":"48,49"}},{"content":"<strong>Vedaene:</strong> De eldste ritual- og hymnetekstene (f.eks. Rigveda).","children":[],"payload":{"tag":"li","lines":"49,50"}},{"content":"<strong>Upanishadene:</strong> Filosofiske tekster om Atman og Brahman.","children":[],"payload":{"tag":"li","lines":"50,51"}}],"payload":{"tag":"h3","lines":"47,48"}},{"content":"Smriti (Det som er husket - menneskeskapt)","children":[{"content":"Tradisjonstekster, lettere tilgjengelig for vanlige folk.","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"<strong>Eposene:</strong> <em>Mahabharata</em> (inkluderer Bhagavadgita) og <em>Ramayana</em>.","children":[],"payload":{"tag":"li","lines":"53,54"}},{"content":"<strong>Puranas:</strong> Fortellinger om de ulike gudene, sentralt for Bhakti-veien.","children":[],"payload":{"tag":"li","lines":"54,56"}}],"payload":{"tag":"h3","lines":"51,52"}}],"payload":{"tag":"h2","lines":"46,47"}},{"content":"6. Praksis og Ritualer (Kult)","children":[{"content":"Puja (Tilbedelse)","children":[{"content":"Utf&#xf8;res i hjemmet (hjemmealter) og i tempelet (Mandir).","children":[],"payload":{"tag":"li","lines":"58,59"}},{"content":"P&#xe5;kallelse av guddommen som gjest. Bruk av <em>Murti</em> (gudestatuer), r&#xf8;kelse, blomster, lys, mat (Prasad) og mantraer.","children":[],"payload":{"tag":"li","lines":"59,60"}}],"payload":{"tag":"h3","lines":"57,58"}},{"content":"Samskara (Overgangsritualer)","children":[{"content":"Ritualer som markerer overganger i livet, renselsesriter.","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"F.eks: F&#xf8;dsel, navngiving, tr&#xe5;dseremoni (initiering for gutter i de tre &#xf8;verste kastene), ekteskap (sv&#xe6;rt sentralt), kremasjon (antyeshti).","children":[],"payload":{"tag":"li","lines":"62,63"}}],"payload":{"tag":"h3","lines":"60,61"}},{"content":"H&#xf8;ytider (Mangfoldig kalender)","children":[{"content":"<strong>Divali:</strong> Lysfesten. Feirer lysets seier over m&#xf8;rket (ofte knyttet til Rama eller Lakshmi).","children":[],"payload":{"tag":"li","lines":"64,65"}},{"content":"<strong>Holi:</strong> Fargefesten. Feirer v&#xe5;ren, fruktbarhet og sosial utjevning.","children":[],"payload":{"tag":"li","lines":"65,67"}}],"payload":{"tag":"h3","lines":"63,64"}}],"payload":{"tag":"h2","lines":"56,57"}},{"content":"7. Retninger og Mangfold","children":[{"content":"De tre hovedretningene","children":[{"content":"Knyttet til hvilken gud som tilbes som den h&#xf8;yeste.","children":[],"payload":{"tag":"li","lines":"69,70"}},{"content":"<strong>Vaishnavisme:</strong> Dyrker Vishnu (og avatarer). St&#xf8;rst retning (ca. 70%).","children":[],"payload":{"tag":"li","lines":"70,71"}},{"content":"<strong>Shaivisme:</strong> Dyrker Shiva (som b&#xe5;de skaper, opprettholder og &#xf8;delegger).","children":[],"payload":{"tag":"li","lines":"71,72"}},{"content":"<strong>Shaktisme:</strong> Dyrker Gudinnen (Devi/Mahadevi/Shakti) som den h&#xf8;yeste kosmiske kraften.","children":[],"payload":{"tag":"li","lines":"72,73"}}],"payload":{"tag":"h3","lines":"68,69"}},{"content":"Hinduisme i Vesten / Norge","children":[{"content":"Diasporamenigheter.","children":[],"payload":{"tag":"li","lines":"74,75"}},{"content":"Tempelet p&#xe5; Ammerud (Norges Hindu Kultursenter, dedikert til Shiva).","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"Vestlig tilpasning av yoga, meditasjon og ISKCON (Hare Krishna).","children":[],"payload":{"tag":"li","lines":"76,77"}}],"payload":{"tag":"h3","lines":"73,74"}}],"payload":{"tag":"h2","lines":"67,68"}}],"payload":{"tag":"h1","lines":"0,1"}
